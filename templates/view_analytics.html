<!DOCTYPE html>
<html>
<head>
    <title>View Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
    min-height:100vh;
    background: linear-gradient(135deg,#dbeafe,#c7d2fe,#e0e7ff);
    padding:40px;
    font-family:'Poppins', sans-serif;
}

        .container {
            max-width:1200px;
            margin:auto;
        }

        .cards {
            display:flex;
            gap:20px;
            margin-bottom:30px;
        }

        .card {
            flex:1;
            background:white;
            padding:18px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .card h2 {
    font-size:32px;
    font-weight:600;
    color:#4f46e5;
    margin-bottom:10px;
}

       .card p {
    font-size:14px;
    color:#334155;
    letter-spacing:1px;
}

        .row {
            display:flex;
            gap:20px;
            margin-bottom:15px;
        }

        .chart-box {
            flex:1;
            background:white;
            padding:18px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        canvas {
    margin-top:10px;
    max-height:220px;
}
        .chart-box h3{
    font-weight:600;
    color:#1e293b;
    margin-bottom:15px;
}
    </style>
</head>

<body>

<div class="container">

    <!-- 🔷 TOP CARDS -->
    <div class="cards">
        <div class="card">
            <h2>{{ total_students }}</h2>
            <p>Total Students</p>
        </div>

        <div class="card">
            <h2>{{ avg_risk }}</h2>
            <p>Average Risk Score</p>
        </div>

        <div class="card">
            <h2>{{ high_risk }}</h2>
            <p>High Risk Students</p>
        </div>
    </div>

    <!-- 🔷 ROW 1 -->
    <div class="row">
        <div class="chart-box">
            <h3>Risk Distribution</h3>
            <canvas id="riskChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Attendance Distribution</h3>
            <canvas id="attendanceChart"></canvas>
        </div>
    </div>

   <!-- 🔷 ROW 2 -->
<div class="row">

    <div class="chart-box">
        <h3>Department-wise Risk Level</h3>
        <canvas id="departmentChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>Department-wise Fee Payment Status</h3>
        <canvas id="feeChart"></canvas>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

// 🔹 1️⃣ Risk Distribution (Polar Area)
new Chart(document.getElementById("riskChart"), {
    type: "polarArea",
    data: {
        labels: ["Low", "Moderate", "High"],
        datasets: [{
            data: [{{ low_count }}, {{ medium_count }}, {{ high_count }}],
            backgroundColor: ["#22c55e","#facc15","#ef4444"]
        }]
    }
});

// 🔹 2️⃣ Attendance Distribution (Bar Chart)
new Chart(document.getElementById("attendanceChart"), {
    type: "bar",
    data: {
        labels: [">75%", "60-75%", "30-60%", "<30%"],
        datasets: [{
            label: "Students",
            data: [{{ att_75 }}, {{ att_60_75 }}, {{ att_30_60 }}, {{ att_below_30 }}],
            backgroundColor: "#6366f1"
        }]
    }
});

// 🔹 3️⃣ Department Wise Risk (Horizontal Bar)
new Chart(document.getElementById("departmentChart"), {
    type: "bar",
    data: {
        labels: {{ dept_labels|tojson }},
        datasets: [{
            label: "Average Risk Score",
            data: {{ dept_risk|tojson }},
            backgroundColor: "#ef4444"
        }]
    },
    options: {
        indexAxis: 'y'
    }
});

// 🔹 Department-wise Fee Payment (Stacked Bar)
new Chart(document.getElementById("feeChart"), {
    type: "bar",
    data: {
        labels: {{ fee_departments|tojson }},
        datasets: [
            {
                label: "Paid",
                data: {{ fee_paid|tojson }},
                backgroundColor: "#22c55e"
            },
            {
                label: "Pending",
                data: {{ fee_pending|tojson }},
                backgroundColor: "#ef4444"
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { position: "top" }
        },
        scales: {
            x: { stacked: true },
            y: { stacked: true }
        }
    }
});

</script>
</body>
</html>
