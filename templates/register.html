<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#dbeafe,#c7d2fe,#e0e7ff);
            position:relative;
            overflow:hidden;
        }

        /* Soft floating background circles */
        body::before, body::after{
            content:"";
            position:absolute;
            width:300px;
            height:300px;
            background:rgba(255,255,255,0.2);
            border-radius:50%;
            filter:blur(80px);
        }

        body::before{
            top:-80px;
            left:-80px;
        }

        body::after{
            bottom:-80px;
            right:-80px;
        }

        .card{
            width:400px;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,0.85);
            backdrop-filter:blur(20px);
            box-shadow:0 20px 40px rgba(0,0,0,0.15);
            text-align:center;
        }

        .card h2{
            margin-bottom:25px;
            color:#334155;
        }

        .input-group{
            position:relative;
            margin-bottom:20px;
        }

        .input-group input,
        .input-group select{
            width:100%;
            padding:12px 40px 12px 15px;
            border-radius:12px;
            border:1px solid #cbd5e1;
            outline:none;
            font-size:14px;
            transition:0.3s;
        }

        .input-group input:focus,
        .input-group select:focus{
            border-color:#6366f1;
            box-shadow:0 0 8px rgba(99,102,241,0.3);
        }

        .eye-icon{
            position:absolute;
            right:12px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:16px;
            color:#64748b;
        }

        .checkbox{
            display:flex;
            align-items:center;
            font-size:13px;
            margin-bottom:20px;
        }

        .checkbox input{
            margin-right:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:30px;
            font-size:15px;
            font-weight:500;
            color:white;
            cursor:pointer;
            background:linear-gradient(90deg,#4f46e5,#6366f1);
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(99,102,241,0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Create Account</h2>

        <form method="POST">

            <div class="input-group">
                <input type="text" name="college" placeholder="College Name" required>
            </div>

            <div class="input-group">
                <select name="role" required>
                    <option value="">Select Role</option>
                    <option>Principal</option>
                    <option>HOD</option>
                    <option>Faculty</option>
                </select>
            </div>

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password"
                       placeholder="Password" required>
                <span class="eye-icon" onclick="togglePassword()"></span>
            </div>

            <div class="checkbox">
                <input type="checkbox" required>
                <label>I agree to Terms & Privacy Policy</label>
            </div>

            <button type="submit">Get Started</button>

        </form>
    </div>

<script>
function togglePassword(){
    var x = document.getElementById("password");
    if (x.type === "password"){
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
